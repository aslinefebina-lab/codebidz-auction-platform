<!DOCTYPE html>
<html>
<head>
<title>CodeBidz Auction Platform</title>
<style>
body{font-family:Arial;text-align:center;background:#f4f4f4}
.container{margin-top:100px}
button{padding:10px 20px;font-size:18px}
</style>
</head>
<body>

<div class="container">
<h1>CodeBidz Auction Platform</h1>
<p>Developed by Team TITAN</p>

<h2>Current Item: Laptop</h2>
<p>Current Bid: ₹10,000</p>

<button onclick="bid()">Place Bid</button>

<p id="msg"></p>
</div>

<script>
let bidAmount = 10000;
function bid(){
bidAmount += 500;
document.querySelector("p").innerHTML="Current Bid: ₹"+bidAmount;
document.getElementById("msg").innerText="Bid placed successfully!";
}
</script>

</body>
</html>
